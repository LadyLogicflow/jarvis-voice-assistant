name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        env:
          # conftest.py also sets these, but exporting here makes it
          # obvious in the CI log that no real keys are involved.
          ANTHROPIC_API_KEY: ci-stub-anthropic-key
          ELEVENLABS_API_KEY: ci-stub-elevenlabs-key
        run: pytest tests/ -q
