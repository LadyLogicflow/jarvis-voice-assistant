<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S.</title>
    <link rel="icon" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JARVIS">
    <meta name="theme-color" content="#00d4ff">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <div id="orb-container">
          <svg id="orb" class="idle" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="glow-strong">
                <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>

              <!-- Gläserne Kugel: dunkel, Lichtquelle oben-links -->
              <radialGradient id="core-grad" cx="36%" cy="30%" r="72%">
                <stop offset="0%"   stop-color="#e8f4ff" stop-opacity="0.50"/>
                <stop offset="22%"  stop-color="#60a4d8" stop-opacity="0.28"/>
                <stop offset="55%"  stop-color="#0820a0" stop-opacity="0.55"/>
                <stop offset="82%"  stop-color="#001050" stop-opacity="0.72"/>
                <stop offset="100%" stop-color="#000a28" stop-opacity="0.92"/>
              </radialGradient>

              <!-- Primärer Spiegelglanz oben-links (Glaslinse) -->
              <radialGradient id="sphere-spec" cx="30%" cy="23%" r="26%">
                <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
                <stop offset="45%"  stop-color="#c8e8ff" stop-opacity="0.40"/>
                <stop offset="100%" stop-color="#c8e8ff" stop-opacity="0"/>
              </radialGradient>

              <!-- Sekundäre Reflexion unten-rechts (Glaskugel-Effekt) -->
              <radialGradient id="sphere-refl" cx="72%" cy="78%" r="28%">
                <stop offset="0%"   stop-color="#40a8e0" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#40a8e0" stop-opacity="0"/>
              </radialGradient>

              <!-- Atmosphärischer Randschimmer -->
              <radialGradient id="sphere-atm" cx="50%" cy="50%" r="50%">
                <stop offset="72%"  stop-color="#00d4ff" stop-opacity="0"/>
                <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.16"/>
              </radialGradient>

              <!-- Clip: Schriftzug wird auf die Kugeloberfläche beschnitten -->
              <clipPath id="sphere-clip">
                <circle cx="100" cy="100" r="54"/>
              </clipPath>
            </defs>

            <!-- Outer glow ring (background atmosphere) -->
            <circle class="hud-glow" cx="100" cy="100" r="92" fill="none" stroke-width="2"/>

            <!-- Outer tick ring — rotates CW -->
            <g class="ring-outer">
              <circle cx="100" cy="100" r="88" fill="none" stroke-width="1.5" stroke-dasharray="2 2.67" class="hud-ring"/>
              <line x1="100" y1="12"  x2="100" y2="22"  class="hud-accent"/>
              <line x1="188" y1="100" x2="178" y2="100" class="hud-accent"/>
              <line x1="100" y1="188" x2="100" y2="178" class="hud-accent"/>
              <line x1="12"  y1="100" x2="22"  y2="100" class="hud-accent"/>
            </g>

            <!-- Middle decorative ring — rotates CCW -->
            <g class="ring-middle">
              <circle cx="100" cy="100" r="72" fill="none" stroke-width="1" stroke-dasharray="4 8" class="hud-ring-mid"/>
              <g transform="rotate(45, 100, 100)">
                <path d="M32,90  L32,32  L90,32"  fill="none" stroke-width="1.5" class="hud-bracket"/>
                <path d="M168,90 L168,32 L110,32" fill="none" stroke-width="1.5" class="hud-bracket"/>
                <path d="M32,110 L32,168 L90,168" fill="none" stroke-width="1.5" class="hud-bracket"/>
                <path d="M168,110 L168,168 L110,168" fill="none" stroke-width="1.5" class="hud-bracket"/>
              </g>
            </g>

            <!-- Glaskugel: Basisfarbe + Spiegelglanz + Reflexion + Atmosphäre -->
            <circle cx="100" cy="100" r="56" fill="url(#core-grad)" class="hud-core-border"/>
            <circle cx="100" cy="100" r="56" fill="url(#sphere-spec)"/>
            <circle cx="100" cy="100" r="56" fill="url(#sphere-refl)"/>
            <circle cx="100" cy="100" r="56" fill="url(#sphere-atm)"/>
            <!-- Kugelrand -->
            <circle cx="100" cy="100" r="56" fill="none" stroke-width="2" class="hud-inner-ring"/>

            <!-- Ein J.A.R.V.I.S.-Label läuft einmal über die Kugel und verschwindet.
                 Kugel dreht sich im Uhrzeigersinn (Text scrollt links→rechts).
                 font-size=9 SVG-Einheiten (18px bei 400px-Canvas), text-transform
                 in CSS erzwingt Großbuchstaben. Ein einzelnes Text-Element,
                 x=-100 → Label tritt bei T≈87 ein, verlässt die Kugel bei T≈254.
                 SMIL to="350 0" ergibt ~4s Pause zwischen zwei Durchläufen. -->
            <g clip-path="url(#sphere-clip)">
              <g>
                <animateTransform attributeName="transform" type="translate"
                  from="0 0" to="350 0" dur="8s" repeatCount="indefinite"/>
                <text x="-100" y="104" class="hud-orbit-text"
                      font-family="'Courier New', Courier, monospace"
                      font-size="9" font-weight="bold">J.A.R.V.I.S.</text>
              </g>
            </g>
          </svg>
        </div>
        <div id="status">Klicke den Orb um zu sprechen</div>
        <div id="transcript"></div>
    </div>
    <script src="/static/main.js"></script>
</body>
</html>
