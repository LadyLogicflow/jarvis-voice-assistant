<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S.</title>
    <link rel="icon" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JARVIS">
    <meta name="theme-color" content="#00d4ff">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <div id="orb-container">
          <svg id="orb" class="idle" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="glow-strong">
                <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <radialGradient id="core-grad" cx="45%" cy="40%" r="60%">
                <stop offset="0%" stop-color="#1a3a5c"/>
                <stop offset="100%" stop-color="#050d1a"/>
              </radialGradient>
            </defs>

            <!-- Outer glow ring (background atmosphere) -->
            <circle class="hud-glow" cx="100" cy="100" r="92" fill="none" stroke-width="2"/>

            <!-- Outer tick ring — rotates CW -->
            <g class="ring-outer">
              <circle cx="100" cy="100" r="88" fill="none" stroke-width="1.5" stroke-dasharray="2 2.67" class="hud-ring"/>
              <!-- 4 longer accent marks at 0/90/180/270 degrees -->
              <line x1="100" y1="12"  x2="100" y2="22"  class="hud-accent"/>
              <line x1="188" y1="100" x2="178" y2="100" class="hud-accent"/>
              <line x1="100" y1="188" x2="100" y2="178" class="hud-accent"/>
              <line x1="12"  y1="100" x2="22"  y2="100" class="hud-accent"/>
            </g>

            <!-- Middle decorative ring — rotates CCW -->
            <g class="ring-middle">
              <circle cx="100" cy="100" r="72" fill="none" stroke-width="1" stroke-dasharray="4 8" class="hud-ring-mid"/>
              <!-- Corner bracket decorations at 4 positions, rotated 45° around center -->
              <g transform="rotate(45, 100, 100)">
                <path d="M32,90  L32,32  L90,32"  fill="none" stroke-width="1.5" class="hud-bracket"/>
                <path d="M168,90 L168,32 L110,32" fill="none" stroke-width="1.5" class="hud-bracket"/>
                <path d="M32,110 L32,168 L90,168" fill="none" stroke-width="1.5" class="hud-bracket"/>
                <path d="M168,110 L168,168 L110,168" fill="none" stroke-width="1.5" class="hud-bracket"/>
              </g>
            </g>

            <!-- Inner solid ring border -->
            <circle cx="100" cy="100" r="56" fill="url(#core-grad)" class="hud-core-border"/>
            <circle cx="100" cy="100" r="56" fill="none" stroke-width="2" class="hud-inner-ring"/>

            <!-- J.A.R.V.I.S. text — zentriert im inneren Kreis (r=56, Mittelpunkt 100/100) -->
            <text x="100" y="100" text-anchor="middle" dominant-baseline="central" textLength="90" lengthAdjust="spacingAndGlyphs" class="hud-title">J.A.R.V.I.S.</text>
          </svg>
        </div>
        <div id="status">Klicke den Orb um zu sprechen</div>
        <div id="transcript"></div>
    </div>
    <script src="/static/main.js"></script>
</body>
</html>
